{% extends 'base.html' %}

{% block title %}Sign Up - CargoFish{% endblock %}


{% block content %}
<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-deep mb-2">Create Account</h1>
            <p class="text-slate-500">Join CargoFish for seamless logistics tracking.</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input type="text" name="full_name" required placeholder="e.g. JOHN DOE"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-ocean/10 focus:border-ocean outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" required placeholder="johndoe"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-ocean/10 focus:border-ocean outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" name="email" required placeholder="john@example.com"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-ocean/10 focus:border-ocean outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Country</label>
                <p class="text-xs text-slate-400 mb-2">Select the country you are in presently.</p>
                <select id="signupCountry" name="country_code" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-ocean/10 focus:border-ocean outline-none transition-all">
                    <option value="">Select your country</option>
                </select>
                <input type="hidden" id="signupCountryName" name="country_name">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="signupPassword" required placeholder="••••••••"
                        class="w-full px-4 py-3 pr-12 rounded-xl border border-slate-200 bg-slate-50 focus:ring-4 focus:ring-ocean/10 focus:border-ocean outline-none transition-all">
                    <button type="button" data-no-loading onclick="togglePasswordVisibility('signupPassword', this)" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                        <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                        <svg class="eye-closed w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" data-loading-delay="1500"
                class="w-full bg-deep text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-800 transition-all shadow-lg hover:shadow-deep/20 mt-4">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-slate-500">
            Already have an account? <a href="/login" class="text-ocean font-bold hover:underline">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    (function () {
        var countrySelect = document.getElementById('signupCountry');
        var countryNameInput = document.getElementById('signupCountryName');
        if (!countrySelect) return;

        function setCountryName() {
            var selected = countrySelect.options[countrySelect.selectedIndex];
            countryNameInput.value = selected && selected.value ? selected.text : '';
        }

        function showCountryError(message) {
            countrySelect.innerHTML = '';
            var opt = document.createElement('option');
            opt.value = '';
            opt.textContent = message || 'Unable to load countries';
            countrySelect.appendChild(opt);
        }

        fetch('/api/geo/countries')
            .then(function (res) {
                return res.json().then(function (data) {
                    return { ok: res.ok, data: data };
                });
            })
            .then(function (result) {
                var data = result.data;
                if (!result.ok) {
                    showCountryError((data && data.error) || 'Unable to load countries');
                    return;
                }
                if (!Array.isArray(data) || data.length === 0) {
                    showCountryError('No countries found');
                    return;
                }
                data.forEach(function (c) {
                    var opt = document.createElement('option');
                    opt.value = c.code || '';
                    opt.textContent = c.name || '';
                    countrySelect.appendChild(opt);
                });
            })
            .catch(function () {
                showCountryError('Unable to load countries');
            });

        countrySelect.addEventListener('change', setCountryName);
    })();
</script>
{% endblock %}
